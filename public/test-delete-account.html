<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account Test Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #667eea;
            margin-right: 10px;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 87, 108, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .response-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-box.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
        }

        .response-box.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
        }

        .response-box pre {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }

        .token-display {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            word-break: break-all;
            font-size: 12px;
            color: #495057;
            margin-top: 10px;
        }

        .warning-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .warning-box strong {
            display: block;
            margin-bottom: 5px;
        }

        .api-url {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #495057;
            margin-bottom: 15px;
        }

        .step-number {
            display: inline-block;
            width: 30px;
            height: 30px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Delete Account Test Page</h1>
        <p class="subtitle">Test the user account deletion API endpoint</p>

        <!-- Step 1: Register -->
        <div class="section">
            <div class="section-title">
                <span class="step-number">1</span>
                Register New User
            </div>
            <div class="api-url">POST /api/register</div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="registerName" placeholder="Enter name" value="Test User">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="Enter email" value="test@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="Enter password" value="password123">
            </div>
            <button class="btn-primary" onclick="registerUser()">Register User</button>
            <div id="registerResponse" class="response-box"></div>
        </div>

        <!-- Step 2: Login -->
        <div class="section">
            <div class="section-title">
                <span class="step-number">2</span>
                Login User
            </div>
            <div class="api-url">POST /api/login</div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Enter email" value="test@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" value="password123">
            </div>
            <button class="btn-success" onclick="loginUser()">Login User</button>
            <div id="loginResponse" class="response-box"></div>
            <div id="tokenDisplay" class="token-display" style="display: none;"></div>
        </div>

        <!-- Step 3: Delete Account -->
        <div class="section">
            <div class="section-title">
                <span class="step-number">3</span>
                Delete Account
            </div>
            <div class="api-url">GET /api/delete-account</div>
            <div class="warning-box">
                <strong>⚠️ Warning:</strong>
                This action is permanent and irreversible. The user account will be deleted from the database.
            </div>
            <div class="form-group">
                <label>Bearer Token (Auto-filled from login)</label>
                <input type="text" id="deleteToken" placeholder="Token will be auto-filled after login">
            </div>
            <button class="btn-danger" onclick="deleteAccount()">Delete Account</button>
            <div id="deleteResponse" class="response-box"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost/api';
        let currentToken = '';

        async function registerUser() {
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;

            const responseBox = document.getElementById('registerResponse');
            responseBox.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();
                
                responseBox.style.display = 'block';
                if (response.ok) {
                    responseBox.className = 'response-box success';
                    responseBox.innerHTML = `
                        <strong>✅ Success!</strong>
                        <p>${data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Auto-fill login fields
                    document.getElementById('loginEmail').value = email;
                    document.getElementById('loginPassword').value = password;
                } else {
                    responseBox.className = 'response-box error';
                    responseBox.innerHTML = `
                        <strong>❌ Error!</strong>
                        <p>${data.message || 'Registration failed'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                responseBox.style.display = 'block';
                responseBox.className = 'response-box error';
                responseBox.innerHTML = `
                    <strong>❌ Network Error!</strong>
                    <p>${error.message}</p>
                `;
            }
        }

        async function loginUser() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            const responseBox = document.getElementById('loginResponse');
            const tokenDisplay = document.getElementById('tokenDisplay');
            responseBox.style.display = 'none';
            tokenDisplay.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                
                responseBox.style.display = 'block';
                if (response.ok && data.success) {
                    currentToken = data.data.token;
                    
                    responseBox.className = 'response-box success';
                    responseBox.innerHTML = `
                        <strong>✅ Login Successful!</strong>
                        <p>${data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Display and auto-fill token
                    tokenDisplay.style.display = 'block';
                    tokenDisplay.innerHTML = `<strong>Token:</strong> ${currentToken}`;
                    document.getElementById('deleteToken').value = currentToken;
                } else {
                    responseBox.className = 'response-box error';
                    responseBox.innerHTML = `
                        <strong>❌ Login Failed!</strong>
                        <p>${data.message || 'Invalid credentials'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                responseBox.style.display = 'block';
                responseBox.className = 'response-box error';
                responseBox.innerHTML = `
                    <strong>❌ Network Error!</strong>
                    <p>${error.message}</p>
                `;
            }
        }

        async function deleteAccount() {
            const token = document.getElementById('deleteToken').value;

            if (!token) {
                alert('Please login first to get a token!');
                return;
            }

            if (!confirm('Are you sure you want to delete this account? This action cannot be undone!')) {
                return;
            }

            const responseBox = document.getElementById('deleteResponse');
            responseBox.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE_URL}/delete-account`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                
                responseBox.style.display = 'block';
                if (response.ok && data.success) {
                    responseBox.className = 'response-box success';
                    responseBox.innerHTML = `
                        <strong>✅ Account Deleted Successfully!</strong>
                        <p>${data.message}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    
                    // Clear token
                    currentToken = '';
                    document.getElementById('deleteToken').value = '';
                    document.getElementById('tokenDisplay').style.display = 'none';
                } else {
                    responseBox.className = 'response-box error';
                    responseBox.innerHTML = `
                        <strong>❌ Delete Failed!</strong>
                        <p>${data.message || 'Failed to delete account'}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                responseBox.style.display = 'block';
                responseBox.className = 'response-box error';
                responseBox.innerHTML = `
                    <strong>❌ Network Error!</strong>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
